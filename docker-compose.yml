services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    networks:
      - localhost_default
    volumes:
      - ./prototype:/var/www/html/prototype
      - ./public:/var/www/html/public
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    image: php:8.2-fpm
    networks:
      - localhost_default
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html

  # 👇 ДОБАВЛЯЕМ БД
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    ports:
      - "3306:3306"
    networks:
      - localhost_default
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypass
    volumes:
      - db_data:/var/lib/mysql

  # 👇 ДОБАВЛЯЕМ phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80"
    networks:
      - localhost_default
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 300M
    depends_on:
      - db

volumes:
  db_data:

networks:
  localhost_default:
    external: true